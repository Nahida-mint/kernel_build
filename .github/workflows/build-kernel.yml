name: Build MikaKernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        run: |
          echo "ANYKERNEL_SOURCE=$(cat config.env | grep -w "ANYKERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "ANYKERNEL_SOURCE_BRANCH=$(cat config.env | grep -w "ANYKERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE=$(cat config.env | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_BRANCH=$(cat config.env | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_CONFIG=$(cat config.env | grep -w "KERNEL_CONFIG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "BUILD_ARGS=$(cat config.env | grep -w "BUILD_ARGS" | head -n 1 | cut -d ":" -f 2)" >> $GITHUB_ENV

      - name: Install Python 2 on Ubuntu 22.04
        run: |
          sudo apt-get update
          sudo apt-get install -y python2
          python2 --version

      - name: Pull toolchain
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 aarch64-linux-android-4.9
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 arm-linux-androideabi-4.9
          mkdir clang && curl https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-vts-15.0_r5/clang-r530567.tar.gz -RLO && tar -C clang/ -xf clang-*.tar.gz

      - name: Pull kernel source
        run: |
          git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} kernel-source

      - name: Build kernel
        run: |
          export KBUILD_BUILD_USER="merdeka45surh"
          export KBUILD_BUILD_HOST="workspace"
          export PATH=$GITHUB_WORKSPACE/clang/bin:${PATH}
          args="                  ARCH=arm64 \
                                  O=../out \
                                  ${{ env.BUILD_ARGS }} \
                                  CLANG_TRIPLE=aarch64-linux-gnu- \
                                  CROSS_COMPILE=$GITHUB_WORKSPACE/aarch64-linux-android-4.9/bin/aarch64-linux-android- \
                                  CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/arm-linux-androideabi-4.9/bin/arm-linux-androideabi- "
          cd kernel-source
          make ${args} ${{ env.KERNEL_CONFIG }}
          make -j$(($(getconf _NPROCESSORS_ONLN) * 2)) ${args}

- name: Package kernel
  run: |
    # 设置变量
    KERNEL_NAME="BloodMoon-Kernel"
    BUILD_DATE=$(date +%Y%m%d-%H%M)
    PACKAGE_DIR="${KERNEL_NAME}-${BUILD_DATE}"
    
    # 创建打包目录结构
    mkdir -p ${PACKAGE_DIR}/{kernel,dtb,modules,scripts}
    
    # 复制内核镜像
    if [[ -f out/arch/arm64/boot/Image.gz ]]; then
      cp out/arch/arm64/boot/Image.gz ${PACKAGE_DIR}/kernel/Image.gz
      KERNEL_IMAGE="Image.gz"
    elif [[ -f out/arch/arm64/boot/Image ]]; then
      cp out/arch/arm64/boot/Image ${PACKAGE_DIR}/kernel/Image
      KERNEL_IMAGE="Image"
    else
      echo "Error: No kernel image found!"
      exit 1
    fi
    
    # 复制所有设备树文件
    find out/arch/arm64/boot -name "*.dtb" -exec cp {} ${PACKAGE_DIR}/dtb/ \;
    
    # 复制 dtbo.img
    if [ -f out/arch/arm64/boot/dtbo.img ]; then
      cp out/arch/arm64/boot/dtbo.img ${PACKAGE_DIR}/dtbo.img
    fi
    
    # 复制内核模块
    if [ -d out/modules ]; then
      cp -r out/modules/* ${PACKAGE_DIR}/modules/
    fi
    
    # 创建简单的打包脚本
    cat > ${PACKAGE_DIR}/scripts/make_bootimg.sh << 'EOF'
#!/bin/bash
# Simple script to create boot.img from kernel and dtb
# Usage: ./make_bootimg.sh <device_dtb_file>

if [ $# -eq 0 ]; then
    echo "Usage: $0 <device_dtb_file>"
    echo "Available DTB files:"
    ls ../dtb/
    exit 1
fi

DTB_FILE=$1
KERNEL_IMAGE="../kernel/Image.gz"  # 或 Image，根据需要修改

if [ ! -f "../dtb/$DTB_FILE" ]; then
    echo "Error: DTB file $DTB_FILE not found!"
    exit 1
fi

# 这里添加制作 boot.img 的命令
# 例如使用 mkbootimg 工具:
# mkbootimg --kernel $KERNEL_IMAGE --dtb ../dtb/$DTB_FILE --output boot.img

echo "Would create boot.img using:"
echo "  Kernel: $KERNEL_IMAGE"
echo "  DTB: ../dtb/$DTB_FILE"
EOF
    
    chmod +x ${PACKAGE_DIR}/scripts/make_bootimg.sh
    
    # 创建构建信息文件
    cat > ${PACKAGE_DIR}/build-info.txt << EOF
Kernel: ${KERNEL_NAME}
Build date: ${BUILD_DATE}
Git commit: ${{ github.sha }}
Kernel image: ${KERNEL_IMAGE}
EOF
    
    # 显示打包内容
    echo "Package contents:"
    tree ${PACKAGE_DIR}
    
    # 创建ZIP包（可选）
    zip -r ${PACKAGE_DIR}.zip ${PACKAGE_DIR}

- name: Upload kernel to artifact
  uses: actions/upload-artifact@v4
  with:
    name: BloodMoon-Kernel-Build-$(date +%Y%m%d-%H%M)
    path: |
      BloodMoon-Kernel-*/BloodMoon-Kernel-*.zip
      BloodMoon-Kernel-*/
