name: Build MikaKernel


on:
  workflow_dispatch:


jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        run: |
          echo "ANYKERNEL_SOURCE=$(cat config.env | grep -w "ANYKERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "ANYKERNEL_SOURCE_BRANCH=$(cat config.env | grep -w "ANYKERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE=$(cat config.env | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_BRANCH=$(cat config.env | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_CONFIG=$(cat config.env | grep -w "KERNEL_CONFIG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "BUILD_ARGS=$(cat config.env | grep -w "BUILD_ARGS" | head -n 1 | cut -d ":" -f 2)" >> $GITHUB_ENV

      - name: Pull toolchain
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 aarch64-linux-android-4.9
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 arm-linux-androideabi-4.9
          mkdir clang && curl https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-dev/clang-r487747c.tar.gz -RLO && tar -C clang/ -xf clang-*.tar.gz

      - name: Pull kernel source
        run: |
          git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} kernel-source

      - name: Build kernel
        run: |
          export KBUILD_BUILD_USER="merdeka45surh"
          export KBUILD_BUILD_HOST="workspace"
          export PATH=$GITHUB_WORKSPACE/clang/bin:${PATH}
          args="                  ARCH=arm64 \
                                  O=../out \
                                  ${{ env.BUILD_ARGS }} \
                                  CLANG_TRIPLE=aarch64-linux-gnu- \
                                  CROSS_COMPILE=$GITHUB_WORKSPACE/aarch64-linux-android-4.9/bin/aarch64-linux-android- \
                                  CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/arm-linux-androideabi-4.9/bin/arm-linux-androideabi- "
          cd kernel-source
          make ${args} ${{ env.KERNEL_CONFIG }}
          make -j$(($(getconf _NPROCESSORS_ONLN) * 2)) ${args}

      - name: Package kernel
  run: |
    # 创建输出目录
    mkdir -p kernel_output

    # 复制内核镜像（优先使用未拼接的版本）
    if [[ -f out/arch/arm64/boot/Image.gz ]]; then
      cp out/arch/arm64/boot/Image.gz kernel_output/Image.gz
      echo "Using Image.gz (uncompressed kernel)"
    elif [[ -f out/arch/arm64/boot/Image ]]; then
      cp out/arch/arm64/boot/Image kernel_output/Image
      echo "Using Image (uncompressed kernel)"
    elif [[ -f out/arch/arm64/boot/Image.gz-dtb ]]; then
      cp out/arch/arm64/boot/Image.gz-dtb kernel_output/Image.gz-dtb
      echo "Using Image.gz-dtb (appended DTB)"
    elif [[ -f out/arch/arm64/boot/Image-dtb ]]; then
      cp out/arch/arm64/boot/Image-dtb kernel_output/Image-dtb
      echo "Using Image-dtb (appended DTB)"
    fi

    # 复制所有设备树文件 (.dtb)
    mkdir -p kernel_output/dtb
    find out/arch/arm64/boot -name "*.dtb" -exec cp {} kernel_output/dtb/ \;
    echo "Copied $(ls -1 kernel_output/dtb/ | wc -l) DTB files"

    # 复制 dtbo.img（如果存在）
    if [ -f out/arch/arm64/boot/dtbo.img ]; then
      cp out/arch/arm64/boot/dtbo.img kernel_output/dtbo.img
      echo "Copied dtbo.img"
    fi

    # 复制内核模块（如果存在）
    if [ -d out/modules ]; then
      cp -r out/modules kernel_output/
      echo "Copied kernel modules"
    fi

    # 显示输出目录内容
    echo "Output directory contents:"
    ls -la kernel_output/
    if [ -d kernel_output/dtb ]; then
      echo "DTB directory contents:"
      ls -la kernel_output/dtb/
    fi

- name: Upload kernel to artifact
  uses: actions/upload-artifact@v4
  with:
    name: BloodMoon-Kernel-Raw-Files
    path: kernel_output/*
