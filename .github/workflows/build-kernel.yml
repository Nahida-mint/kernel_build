name: Build MikaKernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        run: |
          echo "ANYKERNEL_SOURCE=$(cat config.env | grep -w "ANYKERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "ANYKERNEL_SOURCE_BRANCH=$(cat config.env | grep -w "ANYKERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE=$(cat config.env | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_BRANCH=$(cat config.env | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "KERNEL_CONFIG=$(cat config.env | grep -w "KERNEL_CONFIG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
          echo "BUILD_ARGS=$(cat config.env | grep -w "BUILD_ARGS" | head -n 1 | cut -d ":" -f 2)" >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses-dev \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            bc \
            rsync \
            kmod \
            cpio \
            dwarves
      - name: Install Python 2 on Ubuntu 22.04
        run: |
          sudo apt-get install -y python2
          python2 --version
      - name: Pull toolchain
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 aarch64-linux-android-4.9
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 arm-linux-androideabi-4.9
          mkdir clang && curl https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r383902.tar.gz -RLO && tar -C clang/ -xf clang-*.tar.gz
      - name: Pull kernel source
        run: |
          git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} kernel-source
      - name: Set script permissions
        run: |
          # 为所有脚本文件添加执行权限
          find kernel-source/scripts -type f -exec chmod +x {} \;
          # 特别处理已知的脚本文件
          chmod +x kernel-source/scripts/pahole-flags.sh 2>/dev/null || true
          chmod +x kernel-source/scripts/cc-version.sh 2>/dev/null || true
          chmod +x kernel-source/scripts/remove-stale-files 2>/dev/null || true
      - name: Fix kernel config issues
        run: |
          echo "CONFIG_CC_STACKPROTECTOR=n" >> arch/arm64/configs/${{ env.KERNEL_CONFIG }}
          echo "CONFIG_CC_STACKPROTECTOR_STRONG=n" >> arch/arm64/configs/${{ env.KERNEL_CONFIG }}
          echo "CONFIG_CC_STACKPROTECTOR_NONE=y" >> arch/arm64/configs/${{ env.KERNEL_CONFIG }}
      - name: Build kernel
        run: |
          export KBUILD_BUILD_USER="merdeka45surh"
          export KBUILD_BUILD_HOST="workspace"
          export PATH=$GITHUB_WORKSPACE/clang/bin:${PATH}
          args="                  ARCH=arm64 \
                                  O=../out \
                                  ${{ env.BUILD_ARGS }} \
                                  CLANG_TRIPLE=aarch64-linux-gnu- \
                                  CROSS_COMPILE=$GITHUB_WORKSPACE/aarch64-linux-android-4.9/bin/aarch64-linux-android- \
                                  CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/arm-linux-androideabi-4.9/bin/arm-linux-androideabi- \
                                  KCFLAGS=\"-Wno-frame-larger-than\" "  # 只保留这个参数
          cd kernel-source
          make ${args} ${{ env.KERNEL_CONFIG }}
          make -j$(($(getconf _NPROCESSORS_ONLN) * 2)) ${args}
      - name: Collect kernel artifacts
        run: |
          # 创建输出目录
          mkdir -p kernel_artifacts
          
          # 复制内核镜像
          if [[ -f out/arch/arm64/boot/Image.gz ]]; then
            cp out/arch/arm64/boot/Image.gz kernel_artifacts/Image.gz
          elif [[ -f out/arch/arm64/boot/Image ]]; then
            cp out/arch/arm64/boot/Image kernel_artifacts/Image
          fi
          
          # 复制所有设备树文件
          mkdir -p kernel_artifacts/dtb
          find out/arch/arm64/boot -name "*.dtb" -exec cp {} kernel_artifacts/dtb/ \;
          
          # 复制dtbo.img（如果存在）
          if [ -f out/arch/arm64/boot/dtbo.img ]; then
            cp out/arch/arm64/boot/dtbo.img kernel_artifacts/dtbo.img
          fi
          
          # 复制内核模块（如果存在）
          if [ -d out/modules ]; then
            cp -r out/modules kernel_artifacts/
          fi
          
          # 复制编译日志和配置文件（可选）
          if [ -f out/.config ]; then
            cp out/.config kernel_artifacts/kernel.config
          fi
          
          echo "Kernel artifacts collected:"
          ls -la kernel_artifacts/
          if [ -d kernel_artifacts/dtb ]; then
            echo "DTB files:"
            ls -la kernel_artifacts/dtb/
          fi
      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BloodMoon-Kernel-Artifacts
          path: kernel_artifacts/*
